name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0). Required only when run manually."
        required: true
        type: string

# Auth: npm Trusted Publisher (OIDC). No NPM_TOKEN secret needed.
# Configured at npmjs.com → @rendobar/mcp → Settings → Trusted Publisher
# (repo: rendobar/mcp, workflow: release.yml).

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub release notes
      id-token: write   # OIDC for npm Trusted Publisher + provenance
      issues: write     # rollback step opens an issue on failure
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          # Auto-tag mode (push event): use the ref that triggered the workflow.
          # Manual mode (workflow_dispatch): use the `tag` input.
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.tag }}" | sed 's/version=v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 9 }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          # No registry-url: setting it writes _authToken placeholder to ~/.npmrc
          # which overrides OIDC trusted-publisher auth and causes 404 on publish.
          # Registry is configured manually below.
          cache: pnpm

      - name: Configure npm registry (OIDC — no auth token)
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "always-auth=false" >> ~/.npmrc

      - name: Upgrade npm for OIDC trusted publisher support (requires 11.5+)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish to npm via OIDC trusted publisher
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Idempotent: npm publish 403s on an existing version, so a recovery
          # re-run (after a later step like smoke/registry failed) would abort
          # here. If this version is already live, treat publish as done.
          if [ "$(npm view "@rendobar/mcp@${VERSION}" version 2>/dev/null)" = "$VERSION" ]; then
            echo "@rendobar/mcp@${VERSION} already published — skipping publish."
            exit 0
          fi
          # Retry up to 3 times for transient registry blips.
          for i in 1 2 3; do
            if npm publish --provenance --access public; then
              exit 0
            fi
            echo "Publish attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::error::Publish failed after 3 attempts"
          exit 1

      - name: Smoke test (install published package + run bin)
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Step drives its own retry loop; disable errexit so a failed npm
          # call (e.g. CDN not propagated yet) doesn't abort before we retry.
          set +e
          PKG="@rendobar/mcp@${VERSION}"

          # Why not `npx @rendobar/mcp -- --version`: under npm 11, npx resolves
          # the bin name (`rendobar-mcp`) rather than the package and fails with
          # "rendobar-mcp: not found". Install into a throwaway dir and invoke
          # the bin file directly with node — deterministic across npm versions
          # and platforms, and it still proves the published artifact runs.
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT

          # Wait for npm CDN propagation (cheap metadata check), then install.
          for i in 1 2 3 4 5; do
            sleep $((i * 30))
            if [ "$(npm view "$PKG" version 2>/dev/null)" = "$VERSION" ]; then
              echo "Propagated on attempt $i; installing."
              break
            fi
            echo "Attempt $i: $PKG not on registry yet."
          done

          ( cd "$TMP" && npm init -y >/dev/null 2>&1 && npm install "$PKG" >/dev/null 2>&1 )
          BIN="$TMP/node_modules/@rendobar/mcp/dist/bin.js"
          if [ ! -f "$BIN" ]; then
            echo "::error::Install failed — $BIN missing (package not propagated or broken)."
            exit 1
          fi

          OUTPUT=$(node "$BIN" --version 2>&1)
          CLEAN=$(echo "$OUTPUT" | tr -d '\r' | grep -v '^$' | tail -1)
          echo "version output: '$CLEAN' (raw: '$OUTPUT')"
          if [ "$CLEAN" = "$VERSION" ]; then
            echo "Smoke OK"
            exit 0
          fi
          echo "::error::Smoke failed — bin printed '$CLEAN', expected '$VERSION'."
          exit 1

      - name: Create GitHub Release
        # Best-effort — npm publish above is the source of truth. release-please
        # skips its own github-release (see release-please.yml: upstream bug
        # #2214 on root packages), so we cut the release here off the CHANGELOG
        # it maintained. The tag already exists (pushed by release-please.yml).
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
          REF: ${{ steps.tag.outputs.ref }}
        run: |
          # Extract this version's section from CHANGELOG.md (release-please
          # writes "## [X.Y.Z]" headers). Fall back to auto-generated notes.
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md 2>/dev/null)
          if [ -n "$NOTES" ]; then
            printf '%s\n' "$NOTES" > /tmp/notes.md
            gh release create "$REF" --title "$REF" --notes-file /tmp/notes.md --verify-tag
          else
            gh release create "$REF" --title "$REF" --generate-notes --verify-tag
          fi

      - name: Publish to MCP official registry
        # Best-effort — failure here doesn't roll back npm publish.
        # mcp-publisher is a Go binary distributed via GitHub Releases (not npm).
        # Auth: OIDC via id-token:write (already granted above) for io.github.* names.
        continue-on-error: true
        run: |
          PUB_VERSION="1.7.6"
          curl -fsSL -o /tmp/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${PUB_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp
          chmod +x /tmp/mcp-publisher
          # Login via GitHub OIDC (uses ACTIONS_ID_TOKEN_REQUEST_* env auto-provided
          # by GitHub Actions when id-token:write is granted).
          /tmp/mcp-publisher login github-oidc || /tmp/mcp-publisher login github
          /tmp/mcp-publisher publish || echo "::warning::MCP registry publish failed — fix forward"

  rollback-on-failure:
    needs: publish
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open issue for failed release
        run: |
          gh issue create \
            --title "Release ${GITHUB_REF_NAME} failed" \
            --body "The release workflow failed. If npm publish succeeded but a downstream step (smoke / registry) failed, the package is already live — fix forward via a follow-up workflow re-run rather than rolling back. If npm publish itself failed, deprecate any partial version with: \`npm deprecate @rendobar/mcp@${GITHUB_REF_NAME#v} \"do not use\"\`." \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
