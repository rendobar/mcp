name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0). Required only when run manually."
        required: true
        type: string

# Auth: npm Trusted Publisher (OIDC). No NPM_TOKEN secret needed.
# Configured at npmjs.com → @rendobar/mcp → Settings → Trusted Publisher
# (repo: rendobar/mcp, workflow: release.yml).

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub release notes
      id-token: write   # OIDC for npm Trusted Publisher + provenance
      issues: write     # rollback step opens an issue on failure
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          # Auto-tag mode (push event): use the ref that triggered the workflow.
          # Manual mode (workflow_dispatch): use the `tag` input.
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.tag }}" | sed 's/version=v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No registry-url: setting it writes _authToken placeholder to ~/.npmrc
          # which overrides OIDC trusted-publisher auth and causes 404 on publish.
          # Registry is configured manually below.
          cache: pnpm

      - name: Configure npm registry (OIDC — no auth token)
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "always-auth=false" >> ~/.npmrc

      - name: Upgrade npm for OIDC trusted publisher support (requires 11.5+)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish to npm via OIDC trusted publisher
        run: |
          # Retry up to 3 times for transient registry blips.
          for i in 1 2 3; do
            if npm publish --provenance --access public; then
              exit 0
            fi
            echo "Publish attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::error::Publish failed after 3 attempts"
          exit 1

      - name: Smoke test (npx -y @rendobar/mcp@<tag> -- --version)
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PKG="@rendobar/mcp@${VERSION}"
          # npm CDN propagation backoff: 30s, 60s, 90s, 120s, 150s.
          # Use `-- --version` so npx unambiguously passes the flag to the bin
          # (npx 11+ may consume bare --version as its own flag in some setups).
          # Capture exit separately from output so non-zero npx exits with valid
          # output (which sometimes happens on warnings) still get inspected.
          for i in 1 2 3 4 5; do
            sleep $((i * 30))
            echo "Attempt $i: npx -y $PKG -- --version"
            OUTPUT=$(npx -y "$PKG" -- --version 2>&1)
            EXIT=$?
            # Trim trailing whitespace + take last non-empty line (npx may
            # prepend warnings or the bin's stderr may interleave on Windows
            # runners; CI is Linux but be defensive).
            CLEAN=$(echo "$OUTPUT" | tr -d '\r' | grep -v '^$' | tail -1)
            echo "exit=$EXIT clean='$CLEAN' raw='$OUTPUT'"
            if [ "$CLEAN" = "$VERSION" ]; then
              echo "Smoke OK"
              exit 0
            fi
          done
          echo "::error::Smoke test failed after 5 attempts (last raw output above)"
          exit 1

      - name: Publish to MCP official registry
        # Best-effort — failure here doesn't roll back npm publish.
        # mcp-publisher is a Go binary distributed via GitHub Releases (not npm).
        # Auth: OIDC via id-token:write (already granted above) for io.github.* names.
        continue-on-error: true
        run: |
          PUB_VERSION="1.7.6"
          curl -fsSL -o /tmp/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${PUB_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp
          chmod +x /tmp/mcp-publisher
          # Login via GitHub OIDC (uses ACTIONS_ID_TOKEN_REQUEST_* env auto-provided
          # by GitHub Actions when id-token:write is granted).
          /tmp/mcp-publisher login github-oidc || /tmp/mcp-publisher login github
          /tmp/mcp-publisher publish || echo "::warning::MCP registry publish failed — fix forward"

  rollback-on-failure:
    needs: publish
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open issue for failed release
        run: |
          gh issue create \
            --title "Release ${GITHUB_REF_NAME} failed" \
            --body "The release workflow failed. If npm publish succeeded but a downstream step (smoke / registry) failed, the package is already live — fix forward via a follow-up workflow re-run rather than rolling back. If npm publish itself failed, deprecate any partial version with: \`npm deprecate @rendobar/mcp@${GITHUB_REF_NAME#v} \"do not use\"\`." \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
