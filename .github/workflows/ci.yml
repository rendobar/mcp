name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  bundle-size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 11 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Assert dist/bin.js < 100 KB
        run: |
          SIZE=$(stat -c%s dist/bin.js)
          echo "bin.js size: $SIZE bytes"
          if [ "$SIZE" -gt 102400 ]; then
            echo "::error::Bundle exceeds 100 KB budget ($SIZE bytes)"
            exit 1
          fi

  cold-start:
    name: Cold-start budget
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 11 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Assert --version exits in < 2000 ms
        run: |
          # Warm Node up first to avoid first-run skew (module loader, JIT, etc.).
          node dist/bin.js --version >/dev/null
          START=$(date +%s%N)
          node dist/bin.js --version >/dev/null
          END=$(date +%s%N)
          DURATION_MS=$(( (END - START) / 1000000 ))
          echo "Cold-start: $DURATION_MS ms"
          if [ "$DURATION_MS" -gt 2000 ]; then
            echo "::error::Cold-start exceeds 2 s budget ($DURATION_MS ms)"
            exit 1
          fi
